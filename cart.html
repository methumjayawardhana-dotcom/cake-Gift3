<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Lumina</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="scrolled">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-crown"></i> Lumina
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop All</a>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="cart-btn active">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-badge" id="cart-count" style="display:none;">0</span>
        </a>
      </div>
    </div>
  </header>

  <section class="section" style="padding-top: 8rem; min-height: 70vh;">
    <h1 style="margin-bottom: 2rem;">Shopping Cart</h1>
    
    <div class="cart-page" id="cart-content">
      <!-- Injected via JS -->
    </div>
  </section>

  <!-- Scripts -->
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    const renderCart = () => {
      const container = document.getElementById('cart-content');
      
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <i class="fas fa-shopping-basket"></i>
            <h2>Your cart is empty</h2>
            <p style="margin: 1rem 0 2rem;">Looks like you haven't added anything yet.</p>
            <a href="shop.html" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }

      let subtotal = 0;
      let itemsHtml = '<div class="cart-items">';
      
      cart.forEach(item => {
        subtotal += item.price * item.quantity;
        itemsHtml += `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}" class="cart-item-img">
            <div class="cart-item-info">
              <h3 class="cart-item-title">${item.name}</h3>
              <div class="cart-item-price">${formatPrice(item.price)}</div>
            </div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="updateItemQty('${item.id}', -1)"><i class="fas fa-minus" style="font-size: 0.8rem;"></i></button>
              <span style="width: 20px; text-align: center; font-weight: 500;">${item.quantity}</span>
              <button class="qty-btn" onclick="updateItemQty('${item.id}', 1)"><i class="fas fa-plus" style="font-size: 0.8rem;"></i></button>
            </div>
            <button class="cart-item-remove" onclick="removeItem('${item.id}')" title="Remove">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        `;
      });
      itemsHtml += '</div>';

      const delivery = 15.00;
      const total = subtotal + delivery;

      const summaryHtml = `
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span>${formatPrice(subtotal)}</span>
          </div>
          <div class="summary-row">
            <span>Delivery</span>
            <span>${formatPrice(delivery)}</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span>${formatPrice(total)}</span>
          </div>
          <a href="checkout.html" class="btn btn-primary btn-checkout">Proceed to Checkout</a>
        </div>
      `;

      container.innerHTML = itemsHtml + summaryHtml;
      
      // Update badge globally
      updateCartBadge();
    };

    window.updateItemQty = (id, delta) => {
      const item = cart.find(i => i.id === id);
      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) {
          cart = cart.filter(i => i.id !== id);
        }
        saveCart();
        renderCart();
      }
    };

    window.removeItem = (id) => {
      cart = cart.filter(i => i.id !== id);
      saveCart();
      renderCart();
      showToast('Item removed from cart');
    };

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
