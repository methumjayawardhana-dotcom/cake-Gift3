<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Lumina Cakes & Gifts</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="scrolled">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-crown"></i> Lumina
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html" class="active">Shop All</a>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="cart-btn">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-badge" id="cart-count" style="display:none;">0</span>
        </a>
      </div>
    </div>
  </header>

  <div class="page-header">
    <h1>Our Collection</h1>
    <p>Discover our range of handcrafted cakes and premium gifts</p>
  </div>

  <section class="section">
    <div class="filters-bar">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="cakes">Cakes</button>
        <button class="filter-btn" data-filter="flowers">Flowers</button>
        <button class="filter-btn" data-filter="gifts">Gifts</button>
      </div>
      <div>
        <!-- Search or sorting could go here -->
      </div>
    </div>

    <div class="products-grid" id="shop-products">
      <!-- Injected via JS -->
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="footer-grid">
      <div class="footer-col">
        <h4><i class="fas fa-crown"></i> Lumina</h4>
        <p style="color: #8e8e8e; margin-top: 1rem;">Crafting sweet memories since 2024.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const initialCat = urlParams.get('cat') || 'all';
      
      const renderFiltered = (cat) => {
        const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
        renderProductsGrid(filtered, 'shop-products');
        
        // Update active button
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.filter === cat);
        });
      };

      // Initial render
      renderFiltered(initialCat);

      // Filter clicks
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          renderFiltered(e.target.dataset.filter);
        });
      });
    });
  </script>
</body>
</html>
